repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml

  - repo: local
    hooks:
      - id: ruff-format-check
        name: ruff format --check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        require_serial: true

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        require_serial: true

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        require_serial: true
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest tests/
        language: system
        require_serial: true
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -r . -f txt
        language: system
        require_serial: true
        pass_filenames: false
